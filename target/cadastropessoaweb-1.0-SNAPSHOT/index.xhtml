<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    
    <h:head>
        <title>cadastropessoaweb</title>
    </h:head>
    
    <h:body>
        <h:form>
            <h1>Cadastro Pessoa</h1>
            <p:panelGrid columns="2" layout="grid" style="width: 400px">
           <p:outputLabel for="nome" value="Digite seu nome: " styleClass="field" />
            <p:inputText id="nome" value="#{pessoaBean.pessoa.nome}" />
            
            <p:outputLabel for="cpf" value="Digite seu CPF: " styleClass="field" />
            <p:inputMask id="cpf" value="#{pessoaBean.pessoa.cpf}" mask="999.999.999-99" />
            
            <p:outputLabel for="email" value="Digite seu Email: " styleClass="field" />
            <p:inputText id="email" value="#{pessoaBean.pessoa.email}" />             
            </p:panelGrid>
            <br/><br/>
            
            <p:commandButton value="Cadastrar" 
                            action="#{pessoaBean.cadastrar}" 
                            update="@form" 
                            icon="pi pi-check" 
                            styleClass="ui-button-raised" 
                            style="border-radius: 4px;" />
            
            <hr/>
            
            <h:outputText id="resultado" 
                          value="Resultado: #{pessoaBean.pessoa.nome}" 
                          rendered="#{not empty pessoaBean.pessoa.nome}" 
                          style="font-weight: bold; color: green;" />
        </h:form>
    </h:body>
</html>
