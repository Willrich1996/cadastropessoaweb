<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"> 

    <h:head>
        <title>Cadastro Pessoa PrimeFaces</title>
    </h:head>

    <h:body>
        <h:form id="formGeral">
            <p:messages id="msgs" showDetail="true" closable="true">
                <p:autoUpdate />
            </p:messages>

            <p:panel header="Cadastro de Pessoas">
                <h:panelGrid columns="2" id="gridCadastro">
                    <p:outputLabel value="Nome:" for="nome" />
                    <p:inputText id="nome" value="#{pessoaBean.pessoa.nome}" required="true" />

                    <p:outputLabel value="CPF:" for="cpf" />
                    <p:inputMask id="cpf" value="#{pessoaBean.pessoa.cpf}" 
                                 mask="999.999.999-99" required="true" />

                    <p:outputLabel value="Email:" for="email" />
                    <p:inputText id="email" value="#{pessoaBean.pessoa.email}" />
                </h:panelGrid>

                <br/>
                <p:commandButton value="Cadastrar" 
                                 action="#{pessoaBean.cadastrar}" 
                                 update="formGeral" 
                                 icon="pi pi-save" />
            </p:panel>

            <hr/>

            <p:dataTable id="tabelaPessoas" value="#{pessoaBean.lista}" var="p" 
                         emptyMessage="Nenhuma pessoa cadastrada.">
                <p:column headerText="Nome">
                    <h:outputText value="#{p.nome}" />
                </p:column>
                <p:column headerText="CPF">
                    <h:outputText value="#{p.cpf}" />
                </p:column>
                <p:column headerText="Ações">
                    <p:commandButton icon="pi pi-trash" 
                                     action="#{pessoaBean.excluir(p)}" 
                                     update="formGeral"
                                     styleClass="ui-button-danger">
                        <p:confirm header="Confirmação" message="Deseja excluir?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>
                </p:column>
            </p:dataTable>
            
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times" />
            </p:confirmDialog>
        </h:form>
    </h:body> </html>
